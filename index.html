<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Sales Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }

    .app { padding: 2rem; max-width: 1100px; margin: 0 auto; }

    /* Header */
    .customer-header {
      display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #e0e0dc;
      margin-bottom: 1.5rem;
    }
    .customer-name-wrap { flex: 1; min-width: 200px; }
    .customer-name-wrap label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
    .customer-name { font-size: 22px; font-weight: 500; color: #1a1a1a; border: none; background: transparent; width: 100%; outline: none; border-bottom: 1.5px solid transparent; transition: border-color 0.15s; }
    .customer-name:hover, .customer-name:focus { border-bottom-color: #ccc; }
    .customer-name::placeholder { color: #bbb; }

    .meta-fields { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; }
    .meta-field { display: flex; flex-direction: column; gap: 2px; }
    .meta-field label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; }
    .meta-field input { font-size: 14px; border: none; background: transparent; color: #1a1a1a; outline: none; border-bottom: 1px solid #ddd; padding-bottom: 2px; width: 150px; font-family: inherit; }
    .meta-field input:focus { border-bottom-color: #999; }

    .export-btn {
      display: flex; align-items: center; gap: 6px;
      background: white; border: 1px solid #ddd;
      border-radius: 8px; cursor: pointer;
      color: #555; font-family: inherit; font-size: 13px;
      padding: 7px 14px; transition: background 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .export-btn:hover { background: #f0f0ee; border-color: #bbb; }
    .export-btn svg { width: 14px; height: 14px; }

    /* Section labels */
    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.09em; padding: 5px 10px; border-radius: 4px;
      display: inline-block; margin-bottom: 12px;
    }
    .label-purple { background: #ede9ff; color: #534AB7; }
    .label-green  { background: #d4f5e4; color: #0F6E56; }
    .label-gray   { background: #e7e7e7; color: #5a5a5a; }
    .label-blue   { background: #e5edfb; color: #185FA5; }

    /* Layout */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 750px) { .two-col { grid-template-columns: 1fr; } }

    /* Cards */
    .card { background: white; border: 1px solid #e4e4e0; border-radius: 12px; padding: 1rem 1.25rem; }
    .card-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

    /* Editable fields */
    .editable-field {
      width: 100%; border: none; outline: none;
      background: transparent; color: #1a1a1a;
      font-size: 14px; line-height: 1.6; resize: none;
      min-height: 60px; font-family: inherit;
    }
    .editable-field::placeholder { color: #bbb; }

    /* Hypothesis grid */
    .hypothesis-grid { background: white; border: 1px solid #e4e4e0; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .hyp-row { display: grid; grid-template-columns: 180px 1fr; border-bottom: 1px solid #f0f0ec; }
    .hyp-row:last-child { border-bottom: none; }
    .hyp-label { padding: 10px 14px; background: #f5f3ff; font-size: 13px; font-weight: 600; color: #534AB7; display: flex; align-items: center; border-right: 1px solid #ede9ff; }
    .hyp-value { padding: 8px 12px; display: flex; align-items: center; }
    .hyp-value input, .hyp-value textarea { width: 100%; border: none; outline: none; background: transparent; color: #1a1a1a; font-size: 14px; font-family: inherit; resize: none; line-height: 1.5; }
    .hyp-value input::placeholder, .hyp-value textarea::placeholder { color: #bbb; }
    .editable-label { border: none; outline: none; background: transparent; font-size: 13px; font-weight: 600; color: #534AB7; font-family: inherit; cursor: text; width: 100%; }

    /* Status list */
    .status-list { display: flex; flex-direction: column; gap: 10px; }
    .status-item { display: flex; align-items: center; gap: 12px; }
    .status-circle {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid #ccc; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; cursor: pointer;
    }
    .status-circle.done { background: #2dc75c; border-color: #2dc75c; }
    .status-circle.done::after {
      content: ''; width: 6px; height: 10px;
      border: 2px solid white; border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px); display: block;
    }
    .status-text { font-size: 14px; color: #1a1a1a; flex: 1; }
    .status-text.done-text { color: #aaa; text-decoration: line-through; }
    .status-text input { border: none; outline: none; background: transparent; font-size: 14px; font-family: inherit; width: 100%; color: inherit; }

    /* Business table */
    .business-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    .business-table th { text-align: left; padding: 9px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #185FA5; background: #e5edfb; border-bottom: 1px solid #d0ddf5; }
    .business-table td { padding: 7px 8px; border-bottom: 1px solid #f0f0ec; vertical-align: top; }
    .business-table tr:last-child td { border-bottom: none; }
    .business-table tr:hover td { background: #fafafa; }
    .business-table td input { width: 100%; border: none; outline: none; background: transparent; font-size: 13px; font-family: inherit; color: #1a1a1a; padding: 2px 0; }
    .business-table td input::placeholder { color: #bbb; }

    /* Buttons */
    .add-row-btn { background: white; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; color: #666; font-family: inherit; font-size: 13px; padding: 5px 12px; transition: background 0.12s; }
    .add-row-btn:hover { background: #f0f0ee; }
    .del-row-btn { padding: 3px 8px; font-size: 12px; color: #ccc; border: none; background: transparent; cursor: pointer; }
    .del-row-btn:hover { color: #e24b4a; }

    .divider { height: 1px; background: #e4e4e0; margin: 1.5rem 0; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1a1a1a; color: white;
      border-radius: 8px; padding: 10px 16px;
      font-size: 13px; font-family: inherit;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

/* =========================
   SESSION BAR
========================= */
.session-bar button,
.session-bar select {
  height: 32px;
}

  </style>
</head>
<body>
<div class="app">

<!-- ========================= -->
  <!-- SESSION BAR (LEVEL 2) -->
  <!-- ========================= -->
  <div class="session-bar" style="display:flex;gap:12px;align-items:center;margin-bottom:12px;">
    <button class="export-btn" onclick="createNewSession()">Ny session</button>

    <select id="sessionList" onchange="switchSession(this.value)"
      style="font-family:inherit;font-size:13px;padding:6px 10px;border-radius:6px;border:1px solid #ccc;">
    </select>

    <span id="sessionIdLabel" style="font-size:11px;color:#888"></span>
  </div>

  <!-- Header -->
  <div class="customer-header">
    <div class="customer-name-wrap">
      <label>Kund</label>
      <input id="f-kund" class="customer-name" placeholder="Ange kundnamn..." type="text" />
    </div>
    <div class="meta-fields">
      <div class="meta-field">
        <label>Säljare</label>
        <input id="f-saljare" type="text" placeholder="Namn..." />
      </div>
      <div class="meta-field">
        <label>Solution Engineer</label>
        <input id="f-se" type="text" placeholder="Namn..." />
      </div>
      <div class="meta-field">
        <label>Datum</label>
        <input id="f-datum" type="date" />
      </div>
      <button class="export-btn" onclick="exportData()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 2v8M5 7l3 3 3-3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Exportera
      </button>

<button class="export-btn" onclick="exportJSON()">
  Exportera JSON
</button>


<button class="export-btn"
  onclick="document.getElementById('jsonImport').click()">
  Importera JSON
</button>


    </div>
  </div>

  <!-- Main two-column layout -->
  <div class="two-col">

    <!-- Left: Agent Hypotes -->
    <div>
      <div class="section-header">
        <span class="section-label label-purple">Agent Hypotes</span>
      </div>
      <div class="hypothesis-grid">
        <div class="hyp-row">
          <div class="hyp-label"><input class="editable-label" value="Kundsegment" /></div>
          <div class="hyp-value"><input id="h-1" type="text" placeholder="Ange segment..." /></div>
        </div>
        <div class="hyp-row">
          <div class="hyp-label"><input class="editable-label" value="V. Område" /></div>
          <div class="hyp-value"><input id="h-2" type="text" placeholder="Värdeområde..." /></div>
        </div>
        <div class="hyp-row">
          <div class="hyp-label"><input class="editable-label" value="V. Process" /></div>
          <div class="hyp-value"><input id="h-3" type="text" placeholder="Värdeprocess..." /></div>
        </div>
        <div class="hyp-row">
          <div class="hyp-label"><input class="editable-label" value="Delprocess" /></div>
          <div class="hyp-value"><input id="h-4" type="text" placeholder="Delprocess..." /></div>
        </div>
        <div class="hyp-row">
          <div class="hyp-label"><input class="editable-label" value="Roll" /></div>
          <div class="hyp-value"><input id="h-5" type="text" placeholder="Roll..." /></div>
        </div>
        <div class="hyp-row">
          <div class="hyp-label"><input class="editable-label" value="Förmågor" /></div>
          <div class="hyp-value"><textarea id="h-6" class="editable-field" rows="2" placeholder="Förmågor..."></textarea></div>
        </div>
        <div class="hyp-row">
          <div class="hyp-label"><input class="editable-label" value="Nyttor" /></div>
          <div class="hyp-value"><textarea id="h-7" class="editable-field" rows="2" placeholder="Nyttor..."></textarea></div>
        </div>
        <div class="hyp-row">
          <div class="hyp-label"><input class="editable-label" value="User Story" /></div>
          <div class="hyp-value"><textarea id="h-8" class="editable-field" rows="3" placeholder="Som [roll] vill jag [mål] så att [nytta]..."></textarea></div>
        </div>
      </div>
    </div>

    <!-- Right: Verifiering, Status, User Story -->
    <div style="display: flex; flex-direction: column; gap: 16px;">

      <div>
        <div class="section-header">
          <span class="section-label label-green">Verifiering med kund</span>
        </div>
        <div class="card" style="min-height: 180px;">
          <div class="card-title">Anteckningar &amp; kundåterkoppling</div>
          <textarea id="f-verifiering" class="editable-field" rows="7" placeholder="Dokumentera kundinteraktioner, feedback och insikter här..."></textarea>
        </div>
      </div>

      <div class="two-col" style="margin-bottom: 0;">
        <div>
          <div class="section-header">
            <span class="section-label label-gray">Status &amp; Nästa steg</span>
          </div>
          <div class="card">
            <div class="status-list" id="statusList">
              <div class="status-item">
                <div class="status-circle" onclick="toggleStatus(this)"></div>
                <span class="status-text"><input type="text" value="Första möte genomfört" /></span>
              </div>
              <div class="status-item">
                <div class="status-circle" onclick="toggleStatus(this)"></div>
                <span class="status-text"><input type="text" value="Hypoteser verifierade" /></span>
              </div>
              <div class="status-item">
                <div class="status-circle" onclick="toggleStatus(this)"></div>
                <span class="status-text"><input type="text" value="Demo design påbörjad" /></span>
              </div>
              <div class="status-item">
                <div class="status-circle" onclick="toggleStatus(this)"></div>
                <span class="status-text"><input type="text" value="Identifierade Use Cases" /></span>
              </div>
              <div class="status-item">
                <div class="status-circle" onclick="toggleStatus(this)"></div>
                <span class="status-text"><input type="text" value="Nästa möte bokat" /></span>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div class="section-header">
            <span class="section-label label-gray">User Story</span>
          </div>
          <div class="card" style="min-height: 160px;">
            <textarea id="f-userstory" class="editable-field" rows="7" placeholder="Som [roll] vill jag [mål] så att [nytta]..."></textarea>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="divider"></div>

  <!-- Business logic table -->
  <div>
    <div class="section-header">
      <span class="section-label label-blue">Möjlig affärs- och nyttologik</span>
      <button class="add-row-btn" onclick="addBizRow()">+ Lägg till rad</button>
    </div>
    <div class="card" style="padding: 0; overflow: hidden;">
      <table class="business-table">
        <thead>
          <tr>
            <th style="width:14%">Roll</th>
            <th style="width:18%">Delprocess</th>
            <th style="width:26%">Bekräftad utmaning</th>
            <th style="width:20%">Nyttotyp</th>
            <th style="width:18%">Affärsrelevans</th>
            <th style="width:4%"></th>
          </tr>
        </thead>
        <tbody id="bizBody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast">Exporterad!</div>

<script>
let isLoadingState = true;
// ==========================
// SESSION HANDLING (LEVEL 2)
// ==========================
function getSessionId() {
  const params = new URLSearchParams(window.location.search);
  let id = params.get('session');

  if (!id) {
    id = 'session-' + crypto.randomUUID();
    params.set('session', id);
    window.history.replaceState({}, '', `${location.pathname}?${params}`);
  }
  return id;
}

const SESSION_ID = getSessionId();
const STORAGE_KEY = `agentSalesTracker_${SESSION_ID}`;


// ==========================
// SESSION INDEX (LEVEL 2)
// ==========================
const SESSION_INDEX_KEY = 'agentSalesTracker_sessions';

function getSessionIndex() {
  return JSON.parse(localStorage.getItem(SESSION_INDEX_KEY) || '{}');
}

function saveSessionMeta(name) {
  const index = getSessionIndex();
  index[SESSION_ID] = name || '(Namnlös kund)';
  localStorage.setItem(SESSION_INDEX_KEY, JSON.stringify(index));
}

function populateSessionList() {
  const select = document.getElementById('sessionList');
  if (!select) return;

  const index = getSessionIndex();
  select.innerHTML = '';

  Object.entries(index).forEach(([id, name]) => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = name;
    if (id === SESSION_ID) opt.selected = true;
    select.appendChild(opt);
  });

  const lbl = document.getElementById('sessionIdLabel');
  if (lbl) lbl.textContent = SESSION_ID;
}

function createNewSession() {
  // ny session = samma page, utan ?session
  window.location.href = window.location.pathname;
}

function switchSession(id) {
  window.location.href = `${window.location.pathname}?session=${id}`;
}

  function toggleStatus(circle) {
    const isDone = circle.classList.toggle('done');
    const textEl = circle.parentElement.querySelector('.status-text');
    if (isDone) textEl.classList.add('done-text');
    else textEl.classList.remove('done-text');
  }

  function addBizRow(vals) {
    const tbody = document.getElementById('bizBody');
    const tr = document.createElement('tr');
    vals = vals || ['', '', '', '', ''];
    tr.innerHTML = `
      <td><input type="text" placeholder="Roll..." value="${vals[0]}" /></td>
      <td><input type="text" placeholder="Delprocess..." value="${vals[1]}" /></td>
      <td><input type="text" placeholder="Utmaning..." value="${vals[2]}" /></td>
      <td><input type="text" placeholder="Nyttotyp..." value="${vals[3]}" /></td>
      <td><input type="text" placeholder="Relevans..." value="${vals[4]}" /></td>
      <td><button class="del-row-btn" onclick="this.closest('tr').remove()">✕</button></td>
    `;
    tbody.appendChild(tr);
  }

  for (let i = 0; i < 3; i++) addBizRow();

  document.querySelectorAll('textarea').forEach(ta => {
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
  });

  function collectData() {
    const statusItems = [];
    document.querySelectorAll('#statusList .status-item').forEach(item => {
      statusItems.push({
        label: item.querySelector('input').value,
        done: item.querySelector('.status-circle').classList.contains('done')
      });
    });
    const bizRows = [];
    document.querySelectorAll('#bizBody tr').forEach(tr => {
      const inputs = tr.querySelectorAll('input');
      bizRows.push([inputs[0].value, inputs[1].value, inputs[2].value, inputs[3].value, inputs[4].value]);
    });
    const hyp = {};
    document.querySelectorAll('.hypothesis-grid .hyp-row').forEach(row => {
      const label = row.querySelector('.editable-label').value;
      const valEl = row.querySelector('.hyp-value input[type=text], .hyp-value textarea');
      hyp[label] = valEl ? valEl.value : '';
    });
    return {
      kund: document.getElementById('f-kund').value,
      saljare: document.getElementById('f-saljare').value,
      solutionEngineer: document.getElementById('f-se').value,
      datum: document.getElementById('f-datum').value,
      agentHypotes: hyp,
      verifieringMedKund: document.getElementById('f-verifiering').value,
      statusOchNastaSteg: statusItems,
      userStory: document.getElementById('f-userstory').value,
      affarsOchNyttologik: bizRows,
      exporterad: new Date().toLocaleString('sv-SE')
    };
  }

// ==========================
// SAVE / LOAD STATE
// ==========================

function saveState() {
  if (isLoadingState) return;

  const data = collectData();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  saveSessionMeta(data.kund);
  populateSessionList();
}


function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    isLoadingState = false;
    return;
  }

  const data = JSON.parse(raw);

  document.getElementById('f-kund').value = data.kund || '';
  document.getElementById('f-saljare').value = data.saljare || '';
  document.getElementById('f-se').value = data.solutionEngineer || '';
  document.getElementById('f-datum').value = data.datum || '';
  document.getElementById('f-verifiering').value = data.verifieringMedKund || '';
  document.getElementById('f-userstory').value = data.userStory || '';

  
// Agent Hypotes
document.querySelectorAll('.hypothesis-grid .hyp-row').forEach(row => {
  const label = row.querySelector('.editable-label')?.value;
  const input = row.querySelector('.hyp-value input, .hyp-value textarea');
  if (data.agentHypotes?.[label] !== undefined) {
    input.value = data.agentHypotes[label];
  }
});


  
// Status
const list = document.getElementById('statusList');
list.innerHTML = '';

data.statusOchNastaSteg?.forEach(s => {
  const item = document.createElement('div');
  item.className = 'status-item';

  item.innerHTML = `
    <div class="status-circle ${s.done ? 'done' : ''}" onclick="toggleStatus(this)"></div>
    <span class="status-text ${s.done ? 'done-text' : ''}">
      <input type="text" value="${s.label}">
    </span>
  `;
  list.appendChild(item);
});


  // Business table
  document.getElementById('bizBody').innerHTML = '';
  data.affarsOchNyttologik?.forEach(row => addBizRow(row));
}

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function exportData() {
    const data = collectData();
    const kund = data.kund || 'kund';
    const datum = data.datum || new Date().toISOString().slice(0, 10);

    const lines = [];
    lines.push(`KUNDUPPFÖLJNING — ${kund.toUpperCase()}`);
    lines.push('='.repeat(50));
    lines.push(`Säljare: ${data.saljare}    Solution Engineer: ${data.solutionEngineer}    Datum: ${datum}`);
    lines.push('');
    lines.push('AGENT HYPOTES');
    lines.push('-'.repeat(30));
    Object.entries(data.agentHypotes).forEach(([k, v]) => { if (v) lines.push(`${k}: ${v}`); });
    lines.push('');
    lines.push('VERIFIERING MED KUND');
    lines.push('-'.repeat(30));
    lines.push(data.verifieringMedKund || '(ej ifyllt)');
    lines.push('');
    lines.push('STATUS & NÄSTA STEG');
    lines.push('-'.repeat(30));
    data.statusOchNastaSteg.forEach(s => { lines.push(`[${s.done ? 'x' : ' '}] ${s.label}`); });
    lines.push('');
    lines.push('USER STORY');
    lines.push('-'.repeat(30));
    lines.push(data.userStory || '(ej ifyllt)');
    lines.push('');
    lines.push('MÖJLIG AFFÄRS- OCH NYTTOLOGIK');
    lines.push('-'.repeat(30));
    lines.push('Roll | Delprocess | Bekräftad utmaning | Nyttotyp | Affärsrelevans');
    data.affarsOchNyttologik.forEach(row => { if (row.some(c => c)) lines.push(row.join(' | ')); });
    lines.push('');
    lines.push(`Exporterad: ${data.exporterad}`);

    const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${kund.replace(/\s+/g, '-').toLowerCase()}-${datum}.txt`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Exporterad!');
  }

// ==========================
// EXPORT JSON
// ==========================
function exportJSON() {
  const data = collectData();
  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: 'application/json' }
  );

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${SESSION_ID}.json`;
  a.click();
  URL.revokeObjectURL(a.href);

  showToast('JSON exporterad');
}
``

// ==========================
// AUTO SAVE / LOAD
// ==========================
document.addEventListener('input', saveState);
window.addEventListener('DOMContentLoaded', () => {
  loadState();
  populateSessionList();
});


// ==========================
// IMPORT JSON
// ==========================
document.getElementById('jsonImport').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    localStorage.setItem(STORAGE_KEY, ev.target.result);
    location.reload();
  };
  reader.readAsText(file);
});

</script>

<input
  type="file"
  id="jsonImport"
  accept="application/json"
  style="display:none"
/>

</body>
</html>
